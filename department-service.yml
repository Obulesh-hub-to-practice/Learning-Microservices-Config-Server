server:
  port: 9001

spring:
  datasource:
    url: jdbc:mysql://mysql-container:3306/learn-micro-dept
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    consul:
      host: consul-container
      port: 8500
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
