server:
  port: 9002

spring:
  datasource:
    url: jdbc:mysql://host.docker.internal:3307/learn-micro-user
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    consul:
      host: host.docker.internal
      port: 8500
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true          

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      
resilience4j:
  circuitbreaker:
    instances:
      departmentService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true  
        
  retry:
    instances:
      departmentRetry:
        maxAttempts: 3
        waitDuration: 2s
        retryExceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
        ignoreExceptions:
          - java.lang.NullPointerException 
          
  ratelimiter:
    instances:
      departmentRateLimiter:
        limitForPeriod: 3
        limitRefreshPeriod: 10s
        timeoutDuration: 5s
